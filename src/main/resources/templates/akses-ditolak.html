<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Akses Ditolak</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom, #ffebee, #ffffff);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            animation: fadeIn 0.8s ease;
        }

        .error-container i {
            font-size: 64px;
            color: #e53935;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .error-container i:hover {
            transform: scale(1.1);
        }

        .error-container h1 {
            font-size: 36px;
            color: #e53935;
            margin-bottom: 10px;
        }

        .error-container p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background-color: #007aff;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
            margin: 0 8px;
        }

        .btn:hover {
            background-color: #005ecb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>Akses Ditolak</h1>
        <p>Anda tidak memiliki izin untuk mengakses halaman ini.<br>Silakan login terlebih dahulu.</p>
        <a class="btn" th:href="@{/signin}">Kembali ke Login</a>
        <a class="btn" th:href="@{/}">Ke Menu Utama</a>
    </div>
</body>
</html>
