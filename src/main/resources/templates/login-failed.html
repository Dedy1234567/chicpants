<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(115deg, #141E30, #243B55);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            animation: float 6s ease-in-out infinite;
            width: 90%;
            max-width: 400px;
        }

        .container h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .container p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #d1d8e0;
        }

        .container a {
            text-decoration: none;
            font-size: 16px;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            background: linear-gradient(115deg, #ff6b6b, #feca57);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.5);
            transition: all 0.4s ease;
        }

        .container a:hover {
            background: linear-gradient(115deg, #ff9f43, #ee5253);
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.7);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #ff6b6b;
            animation: pulse 1.5s infinite;
        }

        /* Background Particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: none;
            animation: drift 10s infinite linear;
        }

        .particle:nth-child(1) {
            width: 15px;
            height: 15px;
            top: 20%;
            left: 25%;
            animation-duration: 8s;
        }

        .particle:nth-child(2) {
            width: 25px;
            height: 25px;
            top: 70%;
            left: 15%;
            animation-duration: 12s;
        }

        .particle:nth-child(3) {
            width: 20px;
            height: 20px;
            top: 40%;
            left: 80%;
            animation-duration: 10s;
        }

        .particle:nth-child(4) {
            width: 10px;
            height: 10px;
            top: 80%;
            left: 60%;
            animation-duration: 14s;
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(100px, -100px);
            }
        }
    </style>
</head>

<body>
    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Main Container -->
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Login Failed</h1>
        <p>Maaf, nama pengguna atau sandi Anda salah.<br> Silakan coba lagi atau setel ulang sandi Anda.</p>
        <a th:href="@{/sign-in}">Back to Login</a>
    </div>
</body>

</html>
