<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ShopHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('/image/backg2.webp') center/cover;
            opacity: 0.1;
            z-index: -1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            color: #2d3748;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo h1 i {
            color: #667eea;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .form-header h2 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-header p {
            color: #718096;
            font-size: 14px;
        }

        .error-message {
            background: linear-gradient(135deg, #feb2b2, #fecaca);
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            color: #374151;
            background: #ffffff;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #9ca3af;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .auth-link {
            text-align: center;
            color: #718096;
            font-size: 14px;
        }

        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: #9ca3af;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
            z-index: 0;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }

        /* Mobile Styles */
        @media (max-width: 480px) {
            .auth-container {
                padding: 20px;
                border-radius: 16px;
                margin: 8px;
                max-width: none;
            }

            .form-header h2 {
                font-size: 24px;
            }

            .logo h1 {
                font-size: 20px;
            }

            .form-group input {
                padding: 12px 14px 12px 40px;
                font-size: 16px; /* Prevent zoom on iOS */
            }

            .submit-btn {
                padding: 14px;
                font-size: 16px;
            }

            .input-wrapper i {
                left: 14px;
                font-size: 14px;
            }
        }

        /* Tablet Styles */
        @media (min-width: 481px) and (max-width: 768px) {
            .auth-container {
                padding: 32px;
                max-width: 420px;
                border-radius: 18px;
            }

            .form-header h2 {
                font-size: 30px;
            }

            .logo h1 {
                font-size: 26px;
            }

            .form-group input {
                padding: 15px 16px 15px 45px;
            }

            .submit-btn {
                padding: 15px;
            }
        }

        /* Desktop Styles */
        @media (min-width: 769px) {
            body {
                padding: 40px;
            }

            .auth-container {
                padding: 40px;
                max-width: 440px;
                border-radius: 24px;
            }

            .form-header {
                margin-bottom: 32px;
            }

            .logo {
                margin-bottom: 32px;
            }

            .form-header h2 {
                font-size: 32px;
            }

            .logo h1 {
                font-size: 28px;
            }

            .logo p {
                font-size: 16px;
            }

            .form-header p {
                font-size: 16px;
            }

            .form-group {
                margin-bottom: 24px;
            }

            .submit-btn {
                margin-bottom: 24px;
            }
        }

        /* High-resolution displays */
        @media (min-width: 1200px) {
            .auth-container {
                max-width: 480px;
                padding: 48px;
            }
        }

        /* Loading state */
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Input validation styles */
        .form-group input.is-invalid {
            border-color: #ef4444;
        }
        .form-group .field-error {
            color: #c53030;
            font-size: 13px;
            font-weight: 500;
            margin-top: 6px;
            display: block;
        }

    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1><i class="fas fa-shopping-bag"></i>ShopHub</h1>
            <p>Your ultimate shopping destination</p>
        </div>

        <div class="form-header">
            <h2>Create Account</h2>
            <p>Join thousands of happy customers</p>
        </div>

        <div th:if="${errorMessage}" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/signup}" th:object="${user}" method="post" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" th:field="*{username}" placeholder="Choose a unique username"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" />
                </div>
                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" th:field="*{email}" placeholder="Enter your email address"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                </div>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" th:field="*{password}" placeholder="Minimum 6 characters"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" />
                </div>
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="saldo">Initial Balance</label>
                <div class="input-wrapper">
                    <i class="fas fa-wallet"></i>
                    <input type="number" id="saldo" th:field="*{saldo}" placeholder="e.g., 500000" min="0"
                           th:classappend="${#fields.hasErrors('saldo')} ? 'is-invalid' : ''" />
                </div>
                <div th:if="${#fields.hasErrors('saldo')}" th:errors="*{saldo}" class="field-error"></div>
            </div>
            
            <button type="submit" class="submit-btn">
                Create Account
            </button>
        </form>
        
        <div class="auth-link">
            Already have an account? <a th:href="@{/signin}">Sign In</a>
        </div>
    </div>

    <script>
        // Form submission loading state
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('.submit-btn');
            btn.classList.add('loading');
            btn.disabled = true;
        });

        // Input animation effects (opsional, bisa dihapus jika tidak suka)
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
