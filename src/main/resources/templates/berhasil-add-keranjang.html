<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Added</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Roboto', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            animation: slideIn 1s ease-out;
            width: 90%;
            max-width: 400px;
        }

        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #34e89e, #0f3443);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 15px rgba(52, 232, 158, 0.5);
            animation: bounceIn 1.5s ease-in-out;
        }

        .icon-container i {
            font-size: 50px;
            color: #fff;
        }

        .container h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .container p {
            font-size: 16px;
            margin-bottom: 25px;
            color: #d1d8e0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .button-container a {
            text-decoration: none;
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            background: linear-gradient(135deg, #76c7c0, #34e89e);
            color: #fff;
            box-shadow: 0 5px 15px rgba(52, 232, 158, 0.5);
            transition: all 0.4s ease;
        }

        .button-container a:hover {
            background: linear-gradient(135deg, #5ad09d, #20c997);
            box-shadow: 0 10px 20px rgba(90, 208, 157, 0.7);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-container">
            <i>✔</i>
        </div>
        <h1>Barang Ditambahkan!</h1>
        <p>Barang Anda berhasil dimasukkan ke keranjang.</p>
        <div class="button-container">
            <a th:href="@{/menu-user}">Kembali ke Menu</a>
            <a th:href="@{/cart}">Lihat Keranjang</a>
        </div>
    </div>
</body>

</html>
