<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Gagal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ffe6e6, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .error-container {
            text-align: center;
            background: #fff;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .error-container i {
            font-size: 50px;
            color: #e53935;
            margin-bottom: 20px;
        }

        .error-container h1 {
            font-size: 24px;
            color: #444;
            margin-bottom: 10px;
        }

        .error-container p {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .error-container a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .error-container a:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <i class="fas fa-times-circle"></i>
        <h1>Registrasi Gagal</h1>
        <p>Username yang Anda masukkan sudah digunakan. Silakan coba username lain.</p>
        <a th:href="@{/sign-up}">Coba Lagi</a>
    </div>
</body>

</html>
