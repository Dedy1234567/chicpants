<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang Sudah Ada di Keranjang</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fb;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        .icon {
            font-size: 50px;
            color: #e67e22;
            margin-bottom: 20px;
        }

        .message {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .details {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .button-group a {
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            background-color: #3498db;
            color: #fff;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .button-group a:hover {
            background-color: #2980b9;
        }

        .animation {
            animation: bounceIn 1.5s ease-in-out;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

    </style>
</head>

<body>
    <div class="container animation">
        <div class="icon">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="message">
            Barang Sudah Ada di Keranjang
        </div>
        <div class="details">
            Barang yang Anda pilih sudah ada di dalam keranjang belanja. Anda bisa melanjutkan ke pembayaran atau terus berbelanja.
        </div>
        <div class="button-group">
            <a th:href="@{/menu-user}">Back to Home</a>
            <a th:href="@{/cart}">Liat Keranjang</a>
        </div>
    </div>
</body>

</html>
