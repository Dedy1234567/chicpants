<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tambah Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-primary text-white text-center rounded-top-4">
              <h4 class="mb-0">Update Produk</h4>
            </div>
            <div class="card-body p-4">
              <form th:action="@{/add-product}" method="post" enctype="multipart/form-data" th:object="${product}">
                
                <!-- Nama Produk -->
                <div class="mb-3">
                  <label class="form-label">Nama Produk</label>
                  <input type="text" class="form-control" th:field="*{nameProduct}" placeholder="Masukkan nama produk" required />
                </div>

                <!-- Deskripsi -->
                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea 
                        class="form-control" 
                        th:field="*{des}" 
                        rows="3" 
                        placeholder="Masukkan deskripsi produk" 
                        maxlength="17" 
                        required>
                    </textarea>
                    <small class="text-muted">Maksimal 17 huruf</small>
                  </div>

                <!-- Size & Harga -->
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Size</label>
                    <input type="text" class="form-control" th:field="*{size}" placeholder="Contoh: M / L / XL" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Harga</label>
                    <input type="number" class="form-control" th:field="*{harga}" placeholder="Masukkan harga" required />
                  </div>
                </div>

                <!-- Stok & Gambar -->
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number" class="form-control" th:field="*{stok}" placeholder="Jumlah stok tersedia" required />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Upload Gambar</label>
                    <input type="file" class="form-control" name="file" required />
                  </div>
                </div>

                <!-- Kategori -->
                <div class="mb-3">
                  <label class="form-label">Kategori</label>
                  <select class="form-select" th:field="*{category.id}" required>
                    <option value="">-- Pilih Kategori --</option>
                    <th:block th:each="cat : ${categories}">
                      <option th:value="${cat.id}" th:text="${cat.name}"></option>
                    </th:block>
                  </select>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg rounded-pill">Update Product</button>
                </div>

              </form>
            </div>
            <div class="card-footer text-center bg-light rounded-bottom-4">
              <a th:href="@{/menu-admin}" class="btn btn-outline-secondary rounded-pill">⬅ Kembali ke Menu Admin</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
