<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Tidak Cukup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .message-container {
            text-align: center;
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px 20px;
            width: 90%;
            max-width: 400px;
        }

        .message-container h1 {
            font-size: 24px;
            color: #dc3545;
            margin-bottom: 15px;
        }

        .message-container p {
            font-size: 18px;
            color: #6c757d;
            margin-bottom: 20px;
        }

        .message-container a {
            text-decoration: none;
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .message-container a:hover {
            background-color: #0056b3;
        }

        .message-container i {
            color: #dc3545;
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="message-container">
        <i class="fas fa-exclamation-circle"></i>
        <h1>Stok Tidak Cukup</h1>
        <p>Maaf, stok barang yang Anda pilih tidak mencukupi. Silakan pilih barang lain.</p>
        <a th:href="@{/menu-user}">Kembali ke Daftar Barang</a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</body>

</html>
